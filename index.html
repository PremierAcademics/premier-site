<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premier Academics | Premium Academic Bowl Questions</title>
    <style>
        :root {
            --purple-brand: #4A154B; 
            --dark-text: #2D3748;
            --light-bg: #FFFFFF;
            --gray-subtle: #F7FAFC;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            color: var(--dark-text);
            background-color: var(--light-bg);
            line-height: 1.6;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%; /* Increased vertical padding to give the large logo breathing room */
            background: var(--light-bg);
            border-bottom: 2px solid var(--gray-subtle);
        }

        .logo-container {
            display: flex;
            align-items: center;
        }

        .logo-container img {
            height: 120px; /* Made even larger for great visibility */
            width: auto;
            background-color: #FFFFFF; 
            display: block;
        }

        nav {
            display: flex;
            align-items: center; /* Ensures menu links perfectly align with the middle of the logo */
        }

        nav a {
            margin-left: 25px;
            text-decoration: none;
            color: var(--dark-text);
            font-weight: 500;
            font-size: 1.1rem;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--purple-brand);
        }

        .hero {
            text-align: center;
            padding: 5rem 1rem;
            background: linear-gradient(135deg, #ffffff 0%, #f9f6fe 100%);
        }

        .hero h1 {
            font-size: 3rem;
            color: var(--purple-brand);
            margin-bottom: 1rem;
        }

        .btn-primary {
            background-color: var(--purple-brand);
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 1rem;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 3rem 1rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="/premier-site/Premier_Academics_logo_outline_cube.png" alt="Premier Academics Logo">
        </div>
        <nav>
            <a href="#about">About</a>
            <a href="#samples">Sample Games</a>
            <a href="#order">Order Form</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Quality Academic Bowl Questions</h1>
        <p>Founded in 2024, Premier Academics LLC is dedicated to providing elite, thoroughly researched competition sets.</p>
        <a href="#order" class="btn-primary">Place an Order</a>
    </section>

    <div class="container" id="about">
        <h2>Our Mission</h2>
        <p>We craft engaging, balanced, and highly accurate questions to elevate academic competition...</p>
    </div>

</body>
</html>
